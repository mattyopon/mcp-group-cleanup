<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>MCP Group Cleanup</title>
  <style>
    :root {
      --orange: #d97757;
      --orange-dark: #c46748;
      --bg: #faf9f7;
      --card: #ffffff;
      --text: #2b2622;
      --muted: #7a7068;
      --border: #e6e1da;
      --match: #fff3ee;
      --match-border: #f0c4ad;
      --ok: #4a8a4a;
      --err: #b85a4a;
      --err-bg: #fdecea;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      width: 340px;
      margin: 0;
      padding: 12px 12px 10px;
      background: var(--bg);
      color: var(--text);
    }
    h1 {
      font-size: 13px;
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }
    h1 .badge {
      width: 14px;
      height: 14px;
      background: var(--orange);
      border-radius: 3px;
      flex-shrink: 0;
    }
    h1 .ver {
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      margin-left: 4px;
    }
    h1 .info {
      margin-left: auto;
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      padding: 0;
      line-height: 20px;
    }
    h1 .info:hover { background: #f0ece5; }

    .err-banner {
      background: var(--err-bg);
      color: var(--err);
      padding: 6px 8px;
      border-radius: 5px;
      font-size: 11px;
      margin-bottom: 8px;
      line-height: 1.3;
      word-break: break-word;
      display: none;
    }
    .err-banner.show { display: block; }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .filter-row label {
      font-size: 11px;
      color: var(--muted);
      align-self: center;
      white-space: nowrap;
    }
    input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--orange);
    }
    .hint {
      font-size: 10px;
      color: var(--muted);
      margin: -2px 0 6px;
      line-height: 1.3;
    }
    .auto-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .auto-row .label {
      flex: 1;
      color: var(--text);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 30px;
      height: 16px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #d6d0c8;
      transition: .2s;
      border-radius: 16px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 12px; width: 12px;
      left: 2px; bottom: 2px;
      background: #fff;
      transition: .2s;
      border-radius: 50%;
    }
    .switch input:checked + .slider { background: var(--orange); }
    .switch input:checked + .slider:before { transform: translateX(14px); }

    .stats {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .list {
      max-height: 200px;
      overflow-y: auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .empty, .loading {
      padding: 16px 8px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
    }
    .group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .group:last-child { border-bottom: 0; }
    .group.match { background: var(--match); }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .title.untitled {
      color: var(--muted);
      font-style: italic;
    }
    .tabs {
      font-size: 10px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      padding: 1px 5px;
      background: #f0ece5;
      border-radius: 3px;
    }
    .group.match .tabs {
      background: var(--match-border);
      color: #6b3a26;
    }
    .del {
      width: 22px;
      height: 22px;
      padding: 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }
    .del:hover { background: #f0ece5; color: var(--err); }

    .row { display: flex; gap: 6px; }
    button.action {
      border: 0;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 9px 10px;
      font-family: inherit;
      transition: background-color 0.12s;
    }
    button.action:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 1px;
    }
    .primary { background: var(--orange); color: #fff; flex: 1; }
    .primary:hover:not(:disabled) { background: var(--orange-dark); }
    .primary:disabled { background: #d6d0c8; color: #fff; cursor: default; }
    .secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      width: 38px;
      padding: 9px 0;
    }
    .secondary:hover { background: #f0ece5; }

    .undo-row {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 8px;
      background: #fff;
      border: 1px dashed var(--orange);
      border-radius: 5px;
      font-size: 11px;
    }
    .undo-row.show { display: flex; }
    .undo-row .label { flex: 1; color: var(--muted); }
    .undo-row button {
      border: 1px solid var(--orange);
      background: #fff;
      color: var(--orange);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      font-weight: 600;
    }
    .undo-row button:hover { background: var(--match); }

    .msg {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 14px;
      line-height: 1.3;
    }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: #fff;
      padding: 14px;
      border-radius: 8px;
      width: 280px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .modal h2 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--text);
    }
    .modal p {
      margin: 0 0 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }
    .modal .row { gap: 6px; }
    .modal .danger {
      background: var(--err);
      color: #fff;
      flex: 1;
    }
    .modal .danger:hover { background: #9a4839; }

    #diag {
      display: none;
      margin-top: 10px;
      padding: 8px;
      background: #1f1c19;
      color: #f0e8df;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 10px;
      border-radius: 6px;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #diag.show { display: block; }
    #diag-actions {
      display: none;
      margin-top: 6px;
      gap: 6px;
    }
    #diag-actions.show { display: flex; }
    #diag-actions button {
      flex: 1;
      padding: 5px 8px;
      font-size: 11px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    #diag-actions button:hover { background: #f0ece5; }

    .footer {
      margin-top: 8px;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <h1>
    <span class="badge"></span>
    <span>MCP Group Cleanup</span>
    <span class="ver" id="ver"></span>
    <button class="info" id="info-btn" title="診断情報">ⓘ</button>
  </h1>

  <div id="err-banner" class="err-banner"></div>

  <div class="filter-row">
    <label for="filter">タイトル含む:</label>
    <input id="filter" type="text" maxlength="200" placeholder="例: Claude !Pinned">
  </div>
  <div class="hint">空白区切りで複数指定可。<code>!</code> プレフィックスは除外 (例: <code>Claude !Pinned</code>)</div>

  <div class="auto-row">
    <span class="label">30 分ごとに自動クリーンアップ</span>
    <label class="switch">
      <input type="checkbox" id="auto-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats" id="stats">読み込み中…</div>

  <div id="list" class="list">
    <div class="loading">読み込み中…</div>
  </div>

  <div class="row">
    <button id="cleanup" class="action primary" disabled>マッチを全件クリーンアップ</button>
    <button id="refresh" class="action secondary" title="再取得">↻</button>
  </div>
  <div class="msg" id="msg"></div>

  <div class="undo-row" id="undo-row">
    <span class="label" id="undo-label">直前のクリーンアップを元に戻せます</span>
    <button id="undo-btn">元に戻す</button>
  </div>

  <pre id="diag"></pre>
  <div id="diag-actions">
    <button id="diag-copy">クリップボードにコピー</button>
    <button id="diag-close">閉じる</button>
  </div>

  <div class="footer">
    Not affiliated with Anthropic. "Claude" is a trademark of Anthropic, PBC.
  </div>

  <div class="modal-bg" id="confirm-modal">
    <div class="modal">
      <h2>クリーンアップ確認</h2>
      <p id="confirm-text">このタブを閉じます。</p>
      <div class="row">
        <button class="action danger" id="confirm-yes">閉じる</button>
        <button class="action secondary" id="confirm-no" style="width:auto; flex:0 0 90px">キャンセル</button>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
